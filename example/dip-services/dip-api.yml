services:
  dip-api:
    build:
      context: ../apps/dip-api
    restart: unless-stopped
    configs:
      - source: dip-api-config
        target: /app/config.yaml
    depends_on:
      mysql:
        condition: service_healthy
      dip-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      kafka:
        condition: service_started
      opensearch:
        condition: service_healthy

configs:
  dip-api-config:
    content: |
      title: dip-api
      database:
        host: mysql
        port: 3306
        user: dip_user
        password: dip_password
        database: dip_demo
        charset: utf8mb4
      redis:
        host: redis
        port: 6379
        db: 0
      kafka:
        bootstrap_servers: kafka:9092
        topic: dip-demo
      opensearch:
        hosts:
          - http://opensearch:9200
        use_ssl: false
        verify_certs: false
