services:
  dip-db-init:
    build:
      context: ../apps/dip-db-init
    restart: "no"
    configs:
      - source: dip-db-init-sql
        target: /app/init.sql
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: 123qweASD
      APP_DATABASE: dip_demo
      APP_USER: dip_user
      APP_PASSWORD: dip_password

configs:
  dip-db-init-sql:
    file: ../apps/dip-db-init/init.sql
