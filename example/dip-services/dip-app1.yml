services:
  dip-app1:
    image: nginx
    configs:
      - source: dip-app1-index
        target: /usr/share/nginx/html/index.html

configs:
  dip-app1-index:
    content: |
      <!DOCTYPE html>
      <html lang="en">
        <head>
          <meta charset="UTF-8" />
          <title>dip-app1</title>
        </head>
        <body>
          <h1>dip-app1</h1>
          <p>Config injected via compose configs</p>
          <p>Source: dip-services/dip-app1.yml</p>
        </body>
      </html>
