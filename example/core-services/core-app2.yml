services:
  core-app2:
    image: nginx
    environment:
      APP_NAME: core-app2
      INJECTION_METHOD: environment variables
      SOURCE_FILE: core-services/core-app2.yml
      NGINX_ENVSUBST_OUTPUT_DIR: /usr/share/nginx/html
    configs:
      - source: core-app2-template
        target: /etc/nginx/templates/index.html.template

configs:
  core-app2-template:
    content: |
      <!DOCTYPE html>
      <html lang="en">
        <head>
          <meta charset="UTF-8" />
          <title>$${APP_NAME}</title>
        </head>
        <body>
          <h1>$${APP_NAME}</h1>
          <p>Config injected via $${INJECTION_METHOD}</p>
          <p>Source: $${SOURCE_FILE}</p>
        </body>
      </html>
