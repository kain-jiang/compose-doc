services:
  core-app1:
    image: nginx
    configs:
      - source: core-app1-index
        target: /usr/share/nginx/html/index.html

configs:
  core-app1-index:
    content: |
      <!DOCTYPE html>
      <html lang="en">
        <head>
          <meta charset="UTF-8" />
          <title>core-app1</title>
        </head>
        <body>
          <h1>core-app1</h1>
          <p>Config injected via compose configs</p>
          <p>Source: core-services/core-app1.yml</p>
        </body>
      </html>
